# docker-compose.yml
version: '3.8'
services:
  # ── 时序数据库：存储 k6 压测指标 ──
  influxdb:
    image: influxdb:1.8
    ports: ['8086:8086']
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: 'false'
    volumes:
      - influxdb_data:/var/lib/influxdb

  # ── 可视化面板：读取 InfluxDB 数据展示图表 ──
  grafana:
    image: grafana/grafana:11.5.2
    ports: ['3000:3000']
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Admin'
    depends_on: [influxdb]

  # ── 压测引擎：多阶段构建的 k6 镜像 ──
  k6:
    build:
      context: .
      dockerfile: Dockerfile.multistage
    environment:
      BASE_URL: http://host.docker.internal:8080  # 宿主机地址
    command: run /app/mixed-scenario-v2.js --out influxdb=http://influxdb:8086/k6
    depends_on: [influxdb]
    extra_hosts:
      - "host.docker.internal:host-gateway"  # macOS/Windows 必需

volumes:
  influxdb_data: