name: K6 Smoke Test
on:
  push:
    branches: [k6-ci-test]

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build k6 script
        run: |
          npm ci
          npm run build                    # webpack + cp -r src/data dist/data
          ls dist/mixed-scenario-v2.js    # 确认产物存在
          ls dist/data/symbols.json       # 确认数据文件也已复制

      - name: Run k6 with summary
        uses: grafana/k6-action@v0.3.1
        continue-on-error: true            # k6 网络失败也不阻断，交给下一步门禁判断
        with:
          filename: ./dist/mixed-scenario-v2.js
          arguments: --out json=results.json --summary-export=summary.json
      
      - name: Performance Gate（性能门禁）
        run: |
          P95=$(jq '.metrics.order_latency_ms["p(95)"]' summary.json)
          ERROR=$(jq '.metrics.http_req_failed.values.rate' summary.json)
          echo "P95(order) = ${P95}ms | HTTP Error Rate = ${ERROR}"

          # TODO: 验证完后改回 800
          if (( $(echo "$P95 > 1" | bc -l) )); then
            echo "❌ P95 ${P95}ms 超过 1ms 阈值 → FAIL"
            exit 1
          fi
          if (( $(echo "$ERROR > 0.1" | bc -l) )); then
            echo "❌ Error Rate ${ERROR} 超过 10% → FAIL"
            exit 1
          fi
          echo "✅ Performance Gate PASSED"
