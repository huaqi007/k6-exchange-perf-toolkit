name: K6 Smoke Test
on:
  push:
    branches: [k6-ci-test]

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build k6 script
        run: |
          npm ci
          npm run build                    # webpack + cp -r src/data dist/data
          ls dist/mixed-scenario-v2.js    # 确认产物存在
          ls dist/data/symbols.json       # 确认数据文件也已复制

      - name: Start mock server（后台运行）
        run: |
          node scripts/mock-server.js &
          sleep 2                           # 等 mock 启动完毕
          curl -s http://localhost:8080/api/v1/health
          echo "Mock server ready"

      - name: Run k6（直接 Docker，--network host 访问 mock）
        continue-on-error: true
        run: |
          # dist 挂载到 /app，输出文件写到 workspace 根目录
          docker run --rm --network host \
            -v ${{ github.workspace }}/dist:/app \
            -v ${{ github.workspace }}:/output \
            -w /output \
            grafana/k6:latest \
            run /app/mixed-scenario-v2.js \
            --out json=/output/results.json \
            --summary-export=/output/summary.json
          ls -la results.json summary.json 2>/dev/null || echo "k6 输出文件未生成"

      - name: Performance Gate（性能门禁）
        run: |
          # 防御：summary.json 不存在时给出清晰报错
          if [ ! -f summary.json ]; then
            echo "❌ summary.json 未生成 — k6 未能正常完成压测"
            echo "可能原因：靶机不可达、脚本 init 阶段崩溃、或所有请求全部失败"
            if [ -f results.json ]; then
              echo "--- results.json 尾部内容（调试用）---"
              tail -c 2000 results.json
            else
              echo "results.json 也不存在"
            fi
            exit 1
          fi

          P95=$(jq '.metrics.order_latency_ms["p(95)"]' summary.json)
          ERROR=$(jq '.metrics.http_req_failed.values.rate' summary.json)
          echo "P95(order) = ${P95}ms | HTTP Error Rate = ${ERROR}"

          if (( $(echo "$P95 > 800" | bc -l) )); then
            echo "❌ P95 ${P95}ms 超过 800ms 阈值 → FAIL"
            exit 1
          fi
          if (( $(echo "$ERROR > 0.1" | bc -l) )); then
            echo "❌ Error Rate ${ERROR} 超过 10% → FAIL"
            exit 1
          fi
          echo "✅ Performance Gate PASSED"
