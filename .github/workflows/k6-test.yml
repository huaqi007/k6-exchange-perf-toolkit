name: K6 Smoke Test
on:
  push:
    branches: [k6-ci-test]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write        # 允许 workflow 在 PR 下创建评论

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build k6 script
        run: |
          npm ci
          npm run build
          ls dist/mixed-scenario-v2.js
          ls dist/data/symbols.json

      - name: Start mock server（后台运行）
        run: |
          node scripts/mock-server.js &
          sleep 2
          curl -s http://localhost:8080/api/v1/health
          echo "Mock server ready"

      - name: Run k6 with summary
        continue-on-error: true
        run: |
          mkdir -p k6-output
          chmod 0777 k6-output

          docker run --rm --network host \
            -v ${{ github.workspace }}/dist:/app:ro \
            -v ${{ github.workspace }}/k6-output:/output \
            -w /output \
            grafana/k6:latest \
            run /app/mixed-scenario-v2.js \
            --out json=/output/results.json \
            --summary-export=/output/summary.json

          ls -la k6-output/

      - name: Performance Gate（性能门禁）
        id: gate
        run: |
          if [ ! -f k6-output/summary.json ]; then
            echo "❌ k6-output/summary.json 未生成"
            exit 1
          fi

          P95=$(jq -r '.metrics.order_latency_ms["p(95)"] // 0' k6-output/summary.json)
          ERROR=$(jq -r '.metrics.http_req_failed.values.rate // 0' k6-output/summary.json)

          # 写入 GITHUB_ENV，供 PR 评论步骤读取
          echo "P95=${P95}" >> $GITHUB_ENV
          echo "ERROR=${ERROR}" >> $GITHUB_ENV

          # 计算 ✅/❌
          if (( $(echo "$P95 < 800" | bc -l) )); then P95_OK="✅"; else P95_OK="❌"; fi
          if (( $(echo "$ERROR < 0.1" | bc -l) )); then ERR_OK="✅"; else ERR_OK="❌"; fi
          echo "P95_OK=${P95_OK}" >> $GITHUB_ENV
          echo "ERR_OK=${ERR_OK}" >> $GITHUB_ENV

          echo "P95(order) = ${P95}ms ${P95_OK} | HTTP Error Rate = ${ERROR} ${ERR_OK}"

          if [ "${P95_OK}" = "❌" ]; then
            echo "❌ P95 ${P95}ms 超过 800ms 阈值 → FAIL"
            exit 1
          fi
          if [ "${ERR_OK}" = "❌" ]; then
            echo "❌ Error Rate ${ERROR} 超过 10% → FAIL"
            exit 1
          fi
          echo "✅ Performance Gate PASSED"

      - name: Post results to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: k6-perf-report
          message: |
            ## 📊 K6 Performance Test Results
            | 指标 | 实测值 | 阈值 | 结果 |
            |------|--------|------|------|
            | P95 延迟 | ${{ env.P95 }}ms | 800ms | ${{ env.P95_OK }} |
            | 错误率 | ${{ env.ERROR }} | 10% | ${{ env.ERR_OK }} |
            📊 [查看完整日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
