name: K6 Smoke Test
on:
  push:
    branches: [k6-ci-test]    # ← 先在测试分支触发
jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build k6 script
        working-directory: ./k6-ts-project
        run: |
          npm ci
          npx webpack
          ls dist/mixed-scenario-v2.js   # 确认产物存在

      - name: Run k6
        uses: grafana/k6-action@v0.3.1
        with:
          path: ./k6-ts-project/dist/mixed-scenario-v2.js