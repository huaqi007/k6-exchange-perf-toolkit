# ============================================================
# .github/workflows/perf-gate.yml — CI 集成验证
#
# Push / PR 到 main 时自动:
#   1. 编译 TypeScript
#   2. 启动 mock 靶机
#   3. 运行全部 k6 场景（关闭阈值判定，仅验证脚本可运行）
#   4. 汇总 checks 统计并上传 JSON 结果 artifact
#
# 注意：这不是性能门禁。mock 靶机内置随机延迟和 5% 错误，
# 阈值结果仅供参考，不作为 CI 通过/失败判定依据。
# ============================================================

name: CI Smoke Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'proto/**'
  push:
    branches: [main]

env:
  NODE_VERSION: '20'
  K6_VERSION: '0.49.0'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Generate test data
        run: COUNT=1000 node scripts/generate-txns.js

      - name: Start mock services
        run: |
          npm run mock &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo "Mock server ready"
              break
            fi
            echo "Waiting for mock server... ($i/30)"
            sleep 1
          done

      - name: Setup k6
        run: |
          curl -sSL "https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz" | tar xz
          sudo mv "k6-v${K6_VERSION}-linux-amd64/k6" /usr/local/bin/
          k6 version

      - name: Prepare results dir
        run: mkdir -p results

      # --no-thresholds 关闭 k6 内置阈值判定，因为 mock 靶机会故意注入 5% 500 错误，
      # 阈值 breach 不应阻塞 CI。checks 结果仍会写入 JSON 供报告参考。
      - name: Run HTTP Order Stress
        run: k6 run --no-thresholds --out json=results/order-stress.json dist/order-stress.js

      - name: Run gRPC Service Test
        run: k6 run --no-thresholds --out json=results/grpc-service.json dist/grpc-service.js

      - name: Run WebSocket Test
        run: k6 run --no-thresholds --out json=results/market-data-ws.json dist/market-data-ws.js

      - name: Run E2E Full-chain Test
        run: k6 run --no-thresholds --out json=results/e2e-trading.json dist/e2e-trading.js

      - name: Summary
        if: always()
        run: |
          echo "## CI Smoke Test Results" >> "$GITHUB_STEP_SUMMARY"
          for f in results/*.json; do
            [ -f "$f" ] || continue
            scenario=$(basename "$f" .json)
            echo "### $scenario" >> "$GITHUB_STEP_SUMMARY"

            total=$(jq -r 'select(.type=="Point" and .metric=="checks") | .data.value' "$f" | awk '{s+=$1} END {print s+0}')
            passed=$(jq -r 'select(.type=="Point" and .metric=="checks" and .data.tags.result=="pass") | .data.value' "$f" | awk '{s+=$1} END {print s+0}')
            echo "- Checks: $passed / $total passed" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "✅ All scenarios executed. See artifact for full JSON results." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: results/
          retention-days: 30
