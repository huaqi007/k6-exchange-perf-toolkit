# ============================================================
# k8s/configmap.yaml — k6 测试脚本 ConfigMap
#
# testrun.yaml 引用的 ConfigMap `k6-test-scripts` 需先创建。
# 由于 dist 产物在构建时生成，推荐用命令从 dist/ 目录动态创建：
#
#   # 1. 构建
#   npm run build
#
#   # 2. 创建 namespace（如尚未存在）
#   kubectl create namespace perf-testing
#
#   # 3. 从 dist/ 创建 ConfigMap（包含全部场景脚本）
#   kubectl create configmap k6-test-scripts \
#     --from-file=dist/ \
#     -n perf-testing \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   # 4. 运行分布式压测
#   kubectl apply -f k8s/testrun.yaml
#
# 下面提供一个占位空 ConfigMap 声明，仅用于文档说明；
# 实际使用请以上面的 --from-file=dist/ 命令为准。
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-test-scripts
  namespace: perf-testing
  labels:
    app: k6-exchange-perf
  annotations:
    note: "Populate via: kubectl create configmap k6-test-scripts --from-file=dist/ -n perf-testing"
data: {}
